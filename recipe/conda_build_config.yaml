c_stdlib:
  - sysroot                    # [linux]
  - macosx_deployment_target   # [osx]

c_stdlib_version:
  - 2.17  # [linux]
  - 11.0  # [osx]

c_compiler:
  - gcc
cxx_compiler:
  - gxx

# matches hep-forge's hepmc-feedstock, the only root/python pair it's
# currently published for
python:
  - "3.12"
root:
  - 6.34
