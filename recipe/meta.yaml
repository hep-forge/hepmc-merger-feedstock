{% set versions = {
    "2.2.0": "ae513c0653afed35c1ec1cb4e209b0dd990b7c658732829168404475bac41c8c"
} %}

{% set version = environ.get('COMMIT_VERSION', None) %}
{% set version = version or versions.keys()|first %}
{% set version = version|string %}
{% set root_tag = (root or '')|replace('.', '') %}

{% set name = environ.get('ANACONDA_PACKAGE', 'hepmc-merger')|string|lower %}

package:
  name: {{ name }}
  version: {{ environ.get('ANACONDA_VERSION', version)|replace("-", ".") }}

source:
  url: "https://github.com/eic/HEPMC_Merger/archive/refs/tags/v{{ version }}.tar.gz"
  {% if versions.get(version, None) %}
  sha256: {{ versions.get(version) }}
  {% endif %}

build:
  number: 0
  string: "root{{ root_tag }}"
  # CLI tool, not a library -- nothing links against it, so no run_exports.
  # No ROOT dictionary generation currently, but this links against ROOT
  # and could grow one -- pre-emptive protection against conda-build's
  # prefix-relocation corrupting a future lib/*.pcm, matching
  # root-feedstock/root-plus-feedstock's fix for the identical artifact.
  ignore_prefix_files:
    - lib/*.pcm

requirements:
  build:
    - {{ compiler('c') }}
    - {{ compiler('cxx') }}
    - {{ stdlib('c') }}
    - root {{ root }}.*
    - cmake
    - make
  host:
    - root {{ root }}.*
    - hepmc>=3.2.6 root{{ root_tag }}   # needs HepMC3's rootIO component (HepMC3::rootIO)
  run:
    - root {{ root }}.*
    - hepmc>=3.2.6 root{{ root_tag }}

test:
  commands:
    - test -x "${PREFIX}/bin/SignalBackgroundMerger"

about:
  home: "https://github.com/eic/HEPMC_Merger"
  license: "NOASSERTION"
  summary: "Merges signal and background events from HepMC3 files"
  description: |
    SignalBackgroundMerger combines signal and background event samples
    from separate HepMC3 files into pileup-merged events, used in EIC
    detector simulation campaigns. Requires HepMC3 built with ROOT I/O
    support (HepMC3::rootIO) and ROOT itself.

extra:
  recipe-maintainers:
    - meiyasan
